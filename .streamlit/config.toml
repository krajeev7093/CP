[theme]
primaryColor = "#EF553B"
backgroundColor = "#F0F2F6"
secondaryBackgroundColor = "#E8EAED"
textColor = "#262730"

[client]
showErrorDetails = true
toolbarMode = "auto"

[server]
port = 8501
headless = true
enableCORS = true
enableXsrfProtection = true
maxUploadSize = 50
folderWatchList = []

[browser]
gatherUsageStats = false
